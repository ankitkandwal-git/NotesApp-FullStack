version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DB_PATH=/app/backend/data/notes.db
      - JWT_SECRET=your-very-secret-key
      - CORS_ORIGIN=http://localhost:5173
      - PORT=5000
      - NODE_ENV=development
    volumes:
      - ./Backend/server.js:/app/backend/server.js
      - ./Backend/db.js:/app/backend/db.js
      - ./Backend/middleware-serve-frontend.js:/app/backend/middleware-serve-frontend.js
      - ./Backend/routes:/app/backend/routes
      - ./Backend/controller:/app/backend/controller
      - backend_data:/app/backend/data
    networks:
      - notesapp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    networks:
      - notesapp-network
    depends_on:
      - backend

volumes:
  backend_data:

networks:
  notesapp-network:
    driver: bridge
